<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="swordGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#8b1a2b"/>
    </linearGradient>
    <linearGradient id="mageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b68ee"/>
      <stop offset="100%" style="stop-color:#3b2d7a"/>
    </linearGradient>
    <linearGradient id="pluralityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#0a4a5c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#06060e" stroke="#1a1a30" stroke-width="2"/>

  <!-- Swordsman (left) - blade symbol -->
  <path d="M18 35 L28 50 L18 65 L23 50 Z" fill="url(#swordGrad)" filter="url(#glow)"/>

  <!-- First Gap ⊥ (left-center) -->
  <text x="33" y="55" font-size="16" fill="#ffd700" text-anchor="middle" font-family="serif" opacity="0.8">⊥</text>

  <!-- Plurality ⿻ (center) - overlapping squares -->
  <rect x="42" y="38" width="16" height="16" fill="none" stroke="url(#pluralityGrad)" stroke-width="2" rx="2" filter="url(#glow)"/>
  <rect x="46" y="42" width="16" height="16" fill="none" stroke="url(#pluralityGrad)" stroke-width="2" rx="2" filter="url(#glow)"/>

  <!-- Second Gap ⊥ (right-center) -->
  <text x="68" y="55" font-size="16" fill="#ffd700" text-anchor="middle" font-family="serif" opacity="0.8">⊥</text>

  <!-- Mage (right) - orb symbol -->
  <circle cx="80" cy="50" r="10" fill="url(#mageGrad)" filter="url(#glow)"/>
  <circle cx="80" cy="50" r="6" fill="none" stroke="#7b68ee" stroke-width="1.5"/>
  <circle cx="80" cy="50" r="3" fill="#7b68ee" opacity="0.5"/>

  <!-- First Person smile (bottom) -->
  <path d="M40 72 Q50 80 60 72" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
